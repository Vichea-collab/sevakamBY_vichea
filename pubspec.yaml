name: servicefinder
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  google_maps_flutter: ^2.14.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  http: ^1.6.0
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  firebase_core: ^4.1.1
  firebase_app_check: ^0.4.1+2
  firebase_auth: ^6.0.2
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  cloud_functions: ^6.0.6
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4
  khqr_sdk: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/cleaning/
    - assets/images/electrician/
    - assets/images/home_appliance_repair/
    - assets/images/home_maintenance/
    - assets/images/plumber/
    - assets/data/
    - assets/KHQR_assets/
    - .env
